name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    # prevents CI from running forever if something hangs
    timeout-minutes: 60

    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 1. Checkout repository code
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------
      # 2. Setup Node.js 
      # -----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm  # speeds up npm installs

      # -----------------------------------------
      # 3. Install dependencies
      # -----------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------
      # 4. Cache Playwright browsers (IMPORTANT)
      # Speeds up CI massively by not reinstalling browsers every run
      # -----------------------------------------
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------
      # 5. Install Playwright browsers
      # --with-deps installs OS dependencies too (Linux-safe)
      # -----------------------------------------
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -----------------------------------------
      # 6. (IMPORTANT) Run auth/setup first if using storageState
      # Prevents "missing storageState.json" issues in CI
      # -----------------------------------------
      - name: Run auth setup
        run: npx playwright test auth.setup.ts

      # -----------------------------------------
      # 7. Run all tests
      # -----------------------------------------
      - name: Run Playwright tests
        run: npx playwright test

      # -----------------------------------------
      # 8. Upload HTML report (always upload even if tests fail)
      # -----------------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # -----------------------------------------
      # 9. Upload traces (ONLY on failure)
      # Useful for debugging flaky tests in CI
      # -----------------------------------------
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results